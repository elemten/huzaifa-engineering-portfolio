<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Auction and transit smart-contract lab</title>
  <desc id="desc">React clients use a wallet to approve transactions that update Solidity contract state on an Ethereum testnet.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f172a"/><stop offset="1" stop-color="#312e81"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-opacity=".3"/></filter></defs>
  <rect width="1600" height="900" rx="44" fill="url(#bg)"/>
  <text x="105" y="120" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="54" font-weight="700">Smart-contract interaction model</text><text x="105" y="170" fill="#a5b4fc" font-family="Inter,Arial,sans-serif" font-size="24">Two focused testnet prototypes · transparent shared state · explicit transaction approval</text>
  <g font-family="Inter,Arial,sans-serif" filter="url(#s)">
    <rect x="105" y="285" width="300" height="330" rx="28" fill="#1e293b" stroke="#818cf8"/><text x="145" y="345" fill="#a5b4fc" font-size="18" font-weight="700">CLIENT</text><text x="145" y="410" fill="#fff" font-size="34" font-weight="700">React interface</text><text x="145" y="465" fill="#cbd5e1" font-size="20">Auction listings &amp; bids</text><text x="145" y="505" fill="#cbd5e1" font-size="20">Transit validation</text>
    <rect x="525" y="285" width="260" height="330" rx="28" fill="#312e81" stroke="#c7d2fe"/><text x="565" y="345" fill="#c7d2fe" font-size="18" font-weight="700">USER BOUNDARY</text><text x="565" y="410" fill="#fff" font-size="34" font-weight="700">Wallet</text><text x="565" y="465" fill="#e0e7ff" font-size="20">Identity</text><text x="565" y="505" fill="#e0e7ff" font-size="20">Approval</text><text x="565" y="545" fill="#e0e7ff" font-size="20">Signing</text>
    <rect x="905" y="285" width="300" height="330" rx="28" fill="#1e293b" stroke="#818cf8"/><text x="945" y="345" fill="#a5b4fc" font-size="18" font-weight="700">RULES</text><text x="945" y="410" fill="#fff" font-size="34" font-weight="700">Solidity</text><text x="945" y="465" fill="#cbd5e1" font-size="20">State transitions</text><text x="945" y="505" fill="#cbd5e1" font-size="20">Ownership checks</text><text x="945" y="545" fill="#cbd5e1" font-size="20">Escrow logic</text>
    <rect x="1325" y="285" width="170" height="330" rx="28" fill="#312e81" stroke="#c7d2fe"/><text x="1362" y="345" fill="#c7d2fe" font-size="18" font-weight="700">NETWORK</text><text x="1362" y="410" fill="#fff" font-size="28" font-weight="700">Testnet</text><text x="1362" y="465" fill="#e0e7ff" font-size="18">Shared</text><text x="1362" y="500" fill="#e0e7ff" font-size="18">inspectable</text><text x="1362" y="535" fill="#e0e7ff" font-size="18">state</text>
  </g>
  <g stroke="#a5b4fc" stroke-width="6" fill="none"><path d="M405 450h120"/><path d="M785 450h120"/><path d="M1205 450h120"/></g>
  <rect x="105" y="710" width="1390" height="86" rx="20" fill="#fff" opacity=".08"/><text x="145" y="765" fill="#c7d2fe" font-family="Inter,Arial,sans-serif" font-size="22">Maturity boundary: educational prototypes · no audit claim · no production financial use</text>
</svg>
