<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AutoJobApply six-stage pipeline</title>
  <desc id="desc">A diagram showing discovery, enrichment, scoring, tailoring, cover letter generation, and browser-assisted application.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
